name: Deploy

on:
  push:
    branches: [main]
  # PRs (incl. dependabot's) get the test job as a pre-merge check; the
  # build-and-push + deploy jobs are push-to-main only (see their `if:`).
  pull_request:
    branches: [main]

# Per-ref: each PR gets its own group (new pushes cancel that PR's stale
# run), and main's deploys never collide with PR runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # GHCR image names must be lowercase; must match docker-compose.yml.
  IMAGE: ghcr.io/jaaaayden/personal-website

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # Prove the site compiles (type-checks + bundles) before merge/deploy;
      # without this a PR can be green yet break the image build on main.
      - run: npm run build

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Fails until the VPS exists and the three secrets are set — expected.
  # Setup runbook: docs/DEPLOYMENT.md
  deploy:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/personal-website
            git pull --ff-only
            docker compose pull app
            docker compose up -d --no-build
            docker image prune -f
